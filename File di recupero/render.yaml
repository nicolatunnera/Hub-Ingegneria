services:
  - type: web
    name: engineering-cloud-hub
    env: node
    region: frankfurt
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && node server.js
    healthCheckPath: /health
    envVars:
      - key: DATA_DIR
        value: /data
      - key: POLLINATIONS_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
